name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [ready_for_review, review_requested, synchronize, opened]
    branches:
      - main

jobs:
  build:
    if: '! github.event.pull_request.draft'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'
      - name: Install dependencies
        run: poetry install --no-interaction

      # Can't figure out how to cache localstack's image
      - name: Bring up localstack and Lambda
        run: docker compose up ssmbak --detach

      - name: pytest
        run: poetry run pytest -q --tb=line  # 18 passed in 24.90s

      - name: Ruff check
        run: poetry run ruff check

      - name: Ruff format
        run: poetry run ruff format --check

      - name: mypy
        run: poetry run mypy ssmbak

  test-import:
    runs-on: ubuntu-latest
    needs: build  # Run after build job passes
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.3.2

      - name: Build package
        run: poetry build

      - name: Test import in clean environment
        run: |
          python -m venv /tmp/clean_env
          /tmp/clean_env/bin/pip install dist/*.whl
          /tmp/clean_env/bin/python -c "
          import sys
          try:
              import mypy_boto3_s3
              print('ERROR: boto3-stubs is installed')
              sys.exit(1)
          except ImportError:
              print('✓ boto3-stubs not installed (correct)')

          from ssmbak.restore.aws import Resource
          print('✓ ssmbak imports successfully')
          "
